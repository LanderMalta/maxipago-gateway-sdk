name: Release Pipeline

on:
  push:
    branches:
      - 'main'

permissions:
  contents: write
  packages: write

env:
  MP_TEST_ID: ${{ secrets.MP_TEST_ID }}
  MP_TEST_KEY: ${{ secrets.MP_TEST_KEY }}
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Git user
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install

      - name: Bump version and generate changelog
        run: |
          npx standard-version --releaseCommitMessageFormat "chore(release): {{currentTag}} [skip ci]"

      - name: Push changes and tags
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          git fetch origin main
          git rebase origin/main
          git push origin main --follow-tags

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = process.env.VERSION;
            if (!version) {
              throw new Error('VERSION not found');
            }
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `v${version}`,
              body: `Release v${version}`,
              draft: false,
              prerelease: false,
            });
            console.log(`Created release ${release.data.html_url}`);
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure npm for publish and verify token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "Error: NPM_TOKEN secret is not set." >&2
            exit 1
          fi
          NPM_USERCONFIG=${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}
          printf "//registry.npmjs.org/:_authToken=%s\n" "$NPM_TOKEN" > "$NPM_USERCONFIG"
          npm whoami --registry=https://registry.npmjs.org/ || { echo "NPM_TOKEN invalid." >&2; exit 1; }

      - name: Publish to npm
        run: |
          npm publish --access public
